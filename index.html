<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpressBook - Online Train Ticketing</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --dark: #1f2937;
            --light: #f3f4f6;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            background-color: var(--secondary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary);
        }

        .train-list {
            margin-top: 1.5rem;
        }

        .train-card {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fafb;
        }

        .hidden {
            display: none;
        }

        /* Ticket Styling */
        .ticket {
            border: 2px dashed var(--primary);
            background: #fffbfa;
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .ticket-header {
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <header>
        <h1>ExpressBook</h1>
        <div id="user-status">Welcome, Traveler</div>
    </header>

    <div class="container">
        <div id="search-section" class="card">
            <h2>Search Route</h2>
            <form id="search-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="from">From</label>
                        <select id="from" required>
                            <option value="Bengaluru">Bengaluru</option>
                            <option value="Haveri">Haveri</option>
                            <option value="Hubli">Hubli</option>
                            <option value="Mumbai">Mumbai</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="to">To</label>
                        <select id="to" required>
                            <option value="Haveri">Haveri</option>
                            <option value="Bengaluru">Bengaluru</option>
                            <option value="Hubli">Hubli</option>
                            <option value="Mumbai">Mumbai</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Travel Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="submit">Find Trains</button>
            </form>

            <div id="results-section" class="train-list hidden">
                <h3>Available Trains</h3>
                <div id="train-results"></div>
            </div>
        </div>

        <div id="booking-section" class="card hidden">
            <h2>Passenger Details</h2>
            <form id="booking-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="passenger-name">Full Name</label>
                        <input type="text" id="passenger-name" placeholder="Enter name" required>
                    </div>
                    <div class="form-group">
                        <label for="passenger-age">Age</label>
                        <input type="number" id="passenger-age" min="1" max="120" required>
                    </div>
                    <div class="form-group">
                        <label for="seat-pref">Seat Preference</label>
                        <select id="seat-pref">
                            <option value="Lower">Lower</option>
                            <option value="Middle">Middle</option>
                            <option value="Upper">Upper</option>
                            <option value="Side Berth">Side Berth</option>
                        </select>
                    </div>
                </div>
                <button type="submit" style="background-color: var(--success);">Confirm & Book Ticket</button>
            </form>
        </div>

        <div id="ticket-section" class="card hidden">
            <h2 style="color: var(--success);">🎉 Booking Successful!</h2>
            <p>Your ticket has been confirmed. Details below:</p>
            
            <div class="ticket">
                <div class="ticket-header">
                    <h3>ExpressBook Digital Ticket</h3>
                    <strong id="t-pnr">PNR: 432156789</strong>
                </div>
                <div class="form-grid">
                    <div><strong>Passenger:</strong> <span id="t-name"></span></div>
                    <div><strong>Age:</strong> <span id="t-age"></span></div>
                    <div><strong>Train:</strong> <span id="t-train"></span></div>
                    <div><strong>Route:</strong> <span id="t-route"></span></div>
                    <div><strong>Date:</strong> <span id="t-date"></span></div>
                    <div><strong>Seat/Berth:</strong> <span id="t-seat"></span></div>
                </div>
            </div>
            <br>
            <button onclick="window.location.reload()">Book Another Ticket</button>
        </div>
    </div>

    <script>
        // Mock Train Data
        const trains = [
            { id: '101', name: 'Siddhaganga Express (12725)', time: '06:00 AM', price: '₹150' },
            { id: '102', name: 'Rani Chennamma Express (16589)', time: '11:00 PM', price: '₹220' },
            { id: '103', name: 'Jan Shatabdi Express (12079)', time: '01:45 PM', price: '₹180' }
        ];

        let selectedTrain = '';
        let travelDate = '';
        let routeInfo = '';

        // Handle Route Search
        document.getElementById('search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            travelDate = document.getElementById('date').value;

            if (from === to) {
                alert("Source and Destination cannot be the same!");
                return;
            }

            routeInfo = `${from} to ${to}`;
            const resultsDiv = document.getElementById('train-results');
            resultsDiv.innerHTML = '';

            trains.forEach(train => {
                const div = document.createElement('div');
                div.className = 'train-card';
                div.innerHTML = `
                    <div>
                        <strong>${train.name}</strong><br>
                        <small>Departure: ${train.time} | Fare: ${train.price}</small>
                    </div>
                    <button onclick="selectTrain('${train.name}')">Select</button>
                `;
                resultsDiv.appendChild(div);
            });

            document.getElementById('results-section').classList.remove('hidden');
        });

        // Handle Train Selection
        function selectTrain(trainName) {
            selectedTrain = trainName;
            document.getElementById('booking-section').classList.remove('hidden');
            document.getElementById('booking-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Handle Final Ticket Booking
        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('passenger-name').value;
            const age = document.getElementById('passenger-age').value;
            const pref = document.getElementById('seat-pref').value;
            
            // Random PNR and Seat Generation
            const pnr = Math.floor(1000000000 + Math.random() * 9000000000);
            const seatNumber = Math.floor(Math.random() * 72) + 1;

            // Populate Ticket
            document.getElementById('t-pnr').innerText = `PNR: ${pnr}`;
            document.getElementById('t-name').innerText = name;
            document.getElementById('t-age').innerText = age;
            document.getElementById('t-train').innerText = selectedTrain;
            document.getElementById('t-route').innerText = routeInfo;
            document.getElementById('t-date').innerText = travelDate;
            document.getElementById('t-seat').innerText = `Coach S3 / Seat ${seatNumber} (${pref})`;

            // Switch Views
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('booking-section').classList.add('hidden');
            document.getElementById('ticket-section').classList.remove('hidden');
        });

        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').setAttribute('min', today);
    </script>
</body>
</html>
